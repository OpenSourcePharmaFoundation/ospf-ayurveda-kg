# APOC Configuration for OSPF Ayurveda Knowledge Graph
# Copy this file to your Neo4j DBMS Configuration folder
# (In Neo4j Desktop: ... → Open folder → Configuration)

# Enable file import from the import directory
apoc.import.file.enabled=true

# Use Neo4j's import directory configuration
apoc.import.file.use_neo4j_config=true

# Enable file export
apoc.export.file.enabled=true